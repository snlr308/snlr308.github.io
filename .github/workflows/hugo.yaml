name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  # Also trigger whenever the Sync Profile Catalog workflow finishes
  workflow_run:
    workflows: ["Sync Profile Catalog"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build with Hugo
        run: |
          # Ensure README has Front Matter for Hugo if the theme requires it
          # This prepends a simple title so Hugo identifies it as a page
          sed -i '1i ---\ntitle: "‾"\n---' README.md
          hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4